<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#116647" />
  <title>Paiement confirmé — DiasporaLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1A8C64; --green-dark: #116647; --green-light: #EAF5F0;
      --white: #fff; --off: #F7F7F5; --line: #E4E4E0;
      --text: #1A1A18; --muted: #6B6B66; --danger: #C0392B;
      --font: 'Inter', -apple-system, sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font); background: var(--green-dark);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: white; border-radius: 16px; padding: 40px 32px;
      max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .icon-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--green-light); margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      animation: iconPop 0.5s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes iconPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .icon-wrap svg { width: 36px; height: 36px; }
    h1 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.4px; }
    .sub { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .detail-box {
      background: var(--off); border-radius: 10px; padding: 16px;
      margin-bottom: 24px; text-align: left;
    }
    .detail-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 6px 0;
      border-bottom: 1px solid var(--line);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .lbl { color: var(--muted); }
    .detail-row .val { font-weight: 600; color: var(--text); }
    .btn {
      display: block; width: 100%; height: 50px;
      background: var(--green); color: white; border: none;
      border-radius: 10px; font-family: var(--font); font-size: 15px;
      font-weight: 600; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .loader {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 20px 0;
    }
    .spin {
      width: 40px; height: 40px; border: 3px solid var(--green-light);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: var(--danger); font-size: 14px; }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="loader" id="loader">
    <div class="spin"></div>
    <p style="font-size:14px;color:var(--muted)">Vérification du paiement...</p>
  </div>
</div>

<script>
const API_URL = 'https://diasporalink-api.onrender.com/api';

async function verifierPaiement() {
  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');
  const colisId   = params.get('colis');
  const token     = localStorage.getItem('dl_token');
  const card      = document.getElementById('card');

  if (!sessionId || !token) {
    afficherErreur(card, 'Paramètres manquants.');
    return;
  }

  try {
    const res = await fetch(`${API_URL}/paiements/verifier/${sessionId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();

    if (data.paye && data.colis) {
      const c = data.colis;
      afficherSucces(card, c);
    } else {
      afficherErreur(card, 'Paiement non confirmé. Contactez le support.');
    }
  } catch(e) {
    afficherErreur(card, 'Erreur de vérification. Réessayez.');
  }
}

function afficherSucces(card, c) {
  const fmt = v => parseFloat(v||0).toFixed(2) + ' €';
  card.innerHTML = `
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1A8C64" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Paiement confirmé !</h1>
    <p class="sub">Votre commande a été enregistrée. Nous vous contacterons pour organiser la collecte.</p>
    <div class="detail-box">
      <div class="detail-row"><span class="lbl">N° de suivi</span><span class="val">#${c.numeroSuivi}</span></div>
      <div class="detail-row"><span class="lbl">Destination</span><span class="val">${c.villeDestination}, ${c.paysDestination}</span></div>
      <div class="detail-row"><span class="lbl">Destinataire</span><span class="val">${c.nomDestinataire}</span></div>
      <div class="detail-row"><span class="lbl">Montant payé</span><span class="val" style="color:#1A8C64">${fmt(c.tarif?.total)}</span></div>
    </div>
    <a href="/" class="btn">Retour à l'accueil</a>`;
}

function afficherErreur(card, msg) {
  card.innerHTML = `
    <div class="icon-wrap" style="background:#FDECEA">
      <svg viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
    <h1>Paiement non confirmé</h1>
    <p class="sub err">${msg}</p>
    <a href="/" class="btn" style="background:#C0392B">Retour à l'accueil</a>`;
}

verifierPaiement();
</script>
</body>
</html>
