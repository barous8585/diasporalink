<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#085041" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DiasporaLink" />
  <meta name="description" content="Envoyez des colis à votre famille en Afrique, simplement depuis votre domicile." />

  <title>DiasporaLink — Envoi de colis pour la diaspora africaine</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="/css/app.css" />

  <!-- Open Graph -->
  <meta property="og:title" content="DiasporaLink" />
  <meta property="og:description" content="Envoyez des colis à votre famille en Afrique, simplement." />
  <meta property="og:type" content="website" />
</head>
<body>
  <div id="app">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time" id="status-time">09:41</span>
      <div class="status-icons">
        <!-- Signal -->
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="1" y="16" width="3" height="5"/><rect x="6" y="12" width="3" height="9"/><rect x="11" y="8" width="3" height="13"/><rect x="16" y="4" width="3" height="17"/></svg>
        <!-- WiFi -->
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
        <!-- Battery -->
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2" y="7" width="18" height="10" rx="2" ry="2"/><line x1="22" y1="11" x2="22" y2="13" stroke="white" stroke-width="2"/><rect x="4" y="9" width="12" height="6" rx="1" fill="white"/></svg>
      </div>
    </div>

    <!-- Screens Container -->
    <div class="screens-wrapper">
      <div class="screen" id="screen-home" role="main" aria-label="Accueil"></div>
      <div class="screen" id="screen-pickup" role="main" aria-label="Planifier un pick-up"></div>
      <div class="screen" id="screen-payment" role="main" aria-label="Paiement"></div>
      <div class="screen" id="screen-tracking" role="main" aria-label="Suivi de colis"></div>
      <div class="screen" id="screen-messages" role="main" aria-label="Messagerie"></div>
      <div class="screen" id="screen-profile" role="main" aria-label="Profil"></div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" aria-label="Navigation principale">
      <button class="nav-item active" onclick="Router.go('home')" aria-label="Accueil">
        <div class="nav-icon">🏠</div>
        <span class="nav-label">Accueil</span>
      </button>
      <button class="nav-item" onclick="Router.go('pickup')" aria-label="Planifier">
        <div class="nav-icon">➕</div>
        <span class="nav-label">Planifier</span>
      </button>
      <button class="nav-item" onclick="Router.go('tracking')" aria-label="Suivi">
        <div class="nav-icon">📦</div>
        <span class="nav-label">Suivi</span>
        <div class="nav-badge" aria-hidden="true"></div>
      </button>
      <button class="nav-item" onclick="Router.go('messages')" aria-label="Messages">
        <div class="nav-icon">💬</div>
        <span class="nav-label">Messages</span>
      </button>
      <button class="nav-item" onclick="Router.go('profile')" aria-label="Profil">
        <div class="nav-icon">👤</div>
        <span class="nav-label">Profil</span>
      </button>
    </nav>
  </div>

  <!-- Scripts -->
  <script src="/js/store.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/screens.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
